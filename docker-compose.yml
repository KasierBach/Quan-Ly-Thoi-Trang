version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: thua2-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-thua2_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: thua2-web
    restart: always
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-thua2_db}
      - FLASK_ENV=development
      - PORT=4000
    depends_on:
      - db
    env_file:
      - .env

volumes:
  postgres_data:
